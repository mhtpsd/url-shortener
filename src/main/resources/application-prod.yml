spring:
  jpa:
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

logging:
  level:
    com.mohitprasad.urlshortener: INFO
    root: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

app:
  base-url: ${APP_BASE_URL}
