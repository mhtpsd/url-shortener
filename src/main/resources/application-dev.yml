spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    com.mohitprasad.urlshortener: DEBUG
    org.springframework.web: DEBUG

app:
  base-url: http://localhost:8080
