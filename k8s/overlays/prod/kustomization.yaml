apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: url-shortener
resources:
  - ../../base/app/deployment.yaml
  - ../../base/app/service.yaml
  - ../../base/app/hpa.yaml
  - ../../base/postgres/statefulset.yaml
  - ../../base/postgres/service.yaml
  - ../../base/postgres/pvc.yaml
  - ../../base/redis/deployment.yaml
  - ../../base/redis/service.yaml
  - ../../base/kafka/zookeeper.yaml
  - ../../base/kafka/kafka.yaml
  - ../../base/configmaps-secrets/configmap.yaml
  - ../../base/configmaps-secrets/secrets.yaml
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: url-shortener
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 20
    target:
      kind: HorizontalPodAutoscaler
      name: url-shortener-hpa
