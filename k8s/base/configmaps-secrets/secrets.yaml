apiVersion: v1
kind: Secret
metadata:
  name: url-shortener-secrets
  namespace: url-shortener
type: Opaque
# Values are base64 encoded — replace with actual production values
# Example: echo -n 'your-value' | base64
stringData:
  DB_USER: postgres
  DB_PASSWORD: changeme
  REDIS_PASSWORD: changeme
  APP_BASE_URL: https://your-domain.com
